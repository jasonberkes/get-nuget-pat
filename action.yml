name: Get NuGet PAT from Key Vault
description: >
  Fetch the Azure DevOps NuGet feed PAT from Azure Key Vault.
  REQUIRES: azure/login must be called by the caller before this action runs.
  The SP must have Key Vault Secrets User + Key Vault Contributor on the vault.

inputs:
  key-vault:
    description: Azure Key Vault name (e.g. tm-kv-prod-eus2)
    required: true
  secret-name:
    description: Secret name in Key Vault
    required: false
    default: AzureDevOps--PAT

outputs:
  value:
    description: The PAT value (masked in logs)
    value: ${{ steps.fetch.outputs.value }}

runs:
  using: composite
  steps:
    - name: Allow runner IP in Key Vault firewall
      id: allow-ip
      shell: bash
      run: |
        MYIP=$(curl -s https://api.ipify.org)
        RULENAME="gha-$(date +%Y%m%d-%H%M%S)-$$"
        az keyvault network-rule add \
          --name "$KEY_VAULT" \
          --ip-address "$MYIP" \
          --no-wait 2>/dev/null || true
        # Brief pause for rule propagation
        sleep 10
        echo "rule-ip=$MYIP" >> "$GITHUB_OUTPUT"
        echo "rule-name=$RULENAME" >> "$GITHUB_OUTPUT"
      env:
        KEY_VAULT: ${{ inputs.key-vault }}

    - name: Fetch PAT from Key Vault
      id: fetch
      shell: bash
      run: |
        pat=$(az keyvault secret show \
          --vault-name "$KEY_VAULT" \
          --name "$SECRET_NAME" \
          --query value -o tsv)
        if [ -z "$pat" ]; then
          echo "::error::Failed to retrieve secret '$SECRET_NAME' from Key Vault '$KEY_VAULT'"
          exit 1
        fi
        echo "::add-mask::$pat"
        echo "value=$pat" >> "$GITHUB_OUTPUT"
      env:
        KEY_VAULT: ${{ inputs.key-vault }}
        SECRET_NAME: ${{ inputs.secret-name }}

    - name: Remove runner IP from Key Vault firewall
      if: always()
      shell: bash
      run: |
        if [ -n "$RUNNER_IP" ]; then
          az keyvault network-rule remove \
            --name "$KEY_VAULT" \
            --ip-address "$RUNNER_IP" \
            --no-wait 2>/dev/null || true
        fi
      env:
        KEY_VAULT: ${{ inputs.key-vault }}
        RUNNER_IP: ${{ steps.allow-ip.outputs.rule-ip }}
